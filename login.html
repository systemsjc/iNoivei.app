<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Acesso Noivos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #fefae0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 40px; width: 300px; border-radius: 8px; }
        input { width: 100%; padding: 10px; margin: 10px 0; }
        button { width: 100%; padding: 10px; background: #283618; color: white; border: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Acesso Noivos</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="autenticar()">Entrar / Registrar</button>
    </div>

    <script>
        const supabase = supabase.createClient('eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJjZWFvenlwaWp0eHZ0ZmVldWdiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NDMwMDAsImV4cCI6MjA5NzAxOTAwMH0.twEKmTfuyHQcCtZABxdmozePF0kPliu9uHST3ljz1fQ', 'sb_publishable_HI_MzbR6pdqOtMFp8UeTmg_dMZ_F6kq');
        async function autenticar() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const { error } = await supabase.auth.signInWithPassword({ email, senha });
            if (error) {
                await supabase.auth.signUp({ email, senha });
                alert("Cadastro realizado!");
            } else { window.location.href = 'dashboard.html'; }
        }
    </script>
</body>
</html>
