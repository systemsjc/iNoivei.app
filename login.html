<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Acesso Noivos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #fefae0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; width: 320px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #283618; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Área dos Noivos</h2>
        <input type="email" id="email" placeholder="Seu e-mail">
        <input type="password" id="senha" placeholder="Sua senha">
        <button onclick="autenticar()">Entrar ou Criar Conta</button>
    </div>

    <script>
        const supabase = supabase.createClient('https://bceaozypijtxvtfeeugb.supabase.co/rest/v1/', 'bceaozypijtxvtfeeugb');

        async function autenticar() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            
            if(!email || !senha) return alert("Preencha todos os campos");

            const { data, error } = await supabase.auth.signInWithPassword({ email, password: senha });

            if (error) {
                const { error: regError } = await supabase.auth.signUp({ email, password: senha });
                if (regError) alert("Erro: " + regError.message);
                else alert("Cadastro realizado com sucesso! Agora clique em entrar.");
            } else {
                window.location.href = 'dashboard.html';
            }
        }
    </script>
</body>
</html>
