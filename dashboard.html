<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel de Gestão</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #fefae0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <h2>Convidados Confirmados</h2>
        <ul id="lista"></ul>
        <button onclick="sair()">Sair</button>
    </div>

    <script>
        // CORREÇÃO: URL base primeiro, chave anon public depois
        const supabase = supabase.createClient(
            'https://bceaozypijtxvtfeeugb.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJjZWFvenlwaWp0eHZ0ZmVldWdiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NDMwMDAsImV4cCI6MjA5NzAxOTAwMH0.twEKmTfuyHQcCtZABxdmozePF0kPliu9uHST3ljz1fQ'
        );

        async function carregarLista() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return window.location.href = 'login.html';

            try {
                // 1. Busca o evento do usuário logado
                const { data: evento, error: errEvento } = await supabase
                    .from('eventos')
                    .select('id')
                    .eq('user_id', user.id)
                    .single();

                if (errEvento) throw errEvento;

                // 2. Busca convidados
                const { data: convidados, error: errConv } = await supabase
                    .from('convidados')
                    .select('*')
                    .eq('evento_id', evento.id);

                if (errConv) throw errConv;

                const lista = document.getElementById('lista');
                lista.innerHTML = convidados.map(c => `<li>${c.nome}</li>`).join('');
            } catch (e) {
                console.error("Erro ao carregar:", e.message);
                alert("Erro ao buscar dados. Verifique o console (F12).");
            }
        }

        function sair() { 
            supabase.auth.signOut(); 
            window.location.href = 'login.html'; 
        }

        carregarLista();
    </script>
</body>
</html>
